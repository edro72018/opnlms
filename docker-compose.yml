services:
  db:
    image: postgres:16-alpine
    container_name: opnlms
    environment:
      POSTGRES_USER: neto
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: opnlms1
    ports:
      - "5432:5432"
    volumes:
      - lms_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    ports:
      - "6379:6379"

volumes:
  lms_pgdata: